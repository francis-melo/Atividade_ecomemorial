<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Acompanhamento de Atividades</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #20242a;
      --muted: #657080;
      --line: #dfe4ea;
      --brand: #0f766e;
      --brand-dark: #115e59;
      --warn: #b45309;
      --danger: #b91c1c;
      --ok: #15803d;
      --soft: #eef6f5;
      font-family: Arial, Helvetica, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 18px 22px;
      position: sticky;
      top: 0;
      z-index: 5;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0;
    }

    main {
      max-width: 1220px;
      margin: 0 auto;
      padding: 20px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin: 0 0 16px;
      overflow-x: auto;
    }

    .tab {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      white-space: nowrap;
    }

    .tab.active {
      background: var(--brand);
      color: white;
      border-color: var(--brand);
    }

    section {
      display: none;
    }

    section.active {
      display: block;
    }

    .toolbar, .form-grid {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
